name: Deploy Weather Oracle

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2 

      - name: Deploy ExtractWeather
        run: |
          # Move into the folder where your code lives
          cd lambda
          # Zip the file using the exact name from your screenshot
          zip extract_weather.zip extract_weather.py
          # Push to the AWS Function name
          aws lambda update-function-code --function-name ExtractWeather --zip-file fileb://extract_weather.zip

      