name: Deploy Weather Oracle

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2 

      - name: Deploy ExtractWeather
        run: |
          # Move into the folder where your code lives
          cd lambda
          # Zip the file using the exact name from your screenshot
          zip extract_weather.zip extract_weather.py
          # Push to the AWS Function name
          aws lambda update-function-code --function-name ExtractWeather --zip-file fileb://extract_weather.zip

      - name: Deploy Athena SQL View
        run: |
          # 1. Read the SQL file from the repo into a variable
          QUERY=$(cat sql\athena\03_weather_ai_training.sql)
          
          # 2. Tell AWS to execute that SQL in Athena
          # Note: Athena requires an S3 bucket to drop query logs into!
          aws athena start-query-execution \
            --query-string "$QUERY" \
            --query-execution-context Database=default \
            --result-configuration OutputLocation=s3://open-meteo-lake-dinesh-kandoria/athena_pipeline_logs/