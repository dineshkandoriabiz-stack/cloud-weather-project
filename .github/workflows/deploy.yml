name: Deploy Weather Oracle

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2 

      - name: Deploy ExtractWeather
        run: |
          # Use the exact filename on your computer
          zip extract_weather.zip extract_weather.py
          # Deploy to the exact function name in AWS
          aws lambda update-function-code --function-name ExtractWeather --zip-file fileb://extract_weather.zip

      - name: Deploy Weather-AI-Oracle
        run: |
          # Use the exact filename on your computer
          zip ai_oracle.zip weather_ai_oracle.py
          # Deploy to the exact function name in AWS
          aws lambda update-function-code --function-name Weather-AI-Oracle --zip-file fileb://ai_oracle.zip
          
          # Wait for code to process then update environment variables
          sleep 10
          aws lambda update-function-configuration --function-name Weather-AI-Oracle --environment "Variables={GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}}"